<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pauper Liga Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #0f0f12;
            --bg-card: #17171e;
            --bg-card-hover: #22222b;
            --text-main: #f1f1f4;
            --text-muted: #9898a6;
            --accent-gold: #d4af37;
            --accent-blue: #00d2ff;
            --border-color: #2a2a35;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            margin-bottom: 10px;
        }

        header h1 span {
            color: var(--accent-gold);
        }

        header p {
            color: var(--text-muted);
            font-style: italic;
        }

        .controls-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .search-box {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--text-muted);
            color: var(--text-main);
        }

        .filter-btn.active {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: var(--bg-main);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .player-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .player-card:hover {
            border-color: #444455;
            transform: translateY(-2px);
        }

        .player-card.rank-1 {
            border-color: rgba(212, 175, 55, 0.6);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .player-header {
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }

        .player-info-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .rank-number {
            font-size: 1.2rem;
            font-weight: bold;
            width: 30px;
            color: var(--text-muted);
        }

        .rank-1 .rank-number { color: var(--accent-gold); font-size: 1.5rem; }
        .rank-2 .rank-number { color: #c0c0c0; }
        .rank-3 .rank-number { color: #cd7f32; }

        .player-name-wrapper {
            display: flex;
            flex-direction: column;
        }

        .player-name {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .player-nickname {
            font-size: 0.9rem;
            color: var(--accent-gold);
            font-style: italic;
            margin-bottom: 2px;
        }

        .badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
            background: #2a2a35;
            color: #d1d1d6;
            border: 1px solid #444455;
        }

        .player-info-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .form-guide {
            display: flex;
            gap: 4px;
        }

        .form-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .form-win { background-color: #2ed573; box-shadow: 0 0 4px #2ed573; }
        .form-draw { background-color: #ffa502; }
        .form-loss { background-color: #ff4757; }

        .player-score {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-blue);
            min-width: 85px;
            text-align: right;
        }
        .rank-1 .player-score { color: var(--accent-gold); }

        .player-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: #13131a;
        }

        .player-card.active .player-details {
            max-height: 2000px;
            border-top: 1px solid var(--border-color);
            transition: max-height 0.5s ease-in;
        }

        .details-content {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media(min-width: 600px) {
            .details-content { grid-template-columns: 1fr 1fr; }
        }

        .chart-container {
            position: relative;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            height: 220px;
        }

        .history-table-wrapper {
            max-height: 220px;
            overflow-y: auto;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            text-align: left;
        }

        .history-table th {
            color: var(--text-muted);
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .history-table td {
            padding: 10px 8px;
            border-bottom: 1px solid #1a1a24;
        }

        .text-win { color: #2ed573; font-weight: bold; }
        .text-draw { color: #ffa502; }
        .text-loss { color: #ff4757; }

        .no-results {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-style: italic;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏆 <span>Pauper Liga</span></h1>
        <p>Közösségi ranglista és versenyeredmények</p>
    </header>
<!-- 2. LÉPÉS: A Pauper Times magazin szekció helye és dizájnja -->
    <style>
        .news-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-gold);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .news-text {
            flex: 1;
        }

        .news-text h3 {
            color: var(--accent-gold);
            font-size: 1.3rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .news-text p {
            color: var(--text-main);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .news-card-thumb {
            width: 110px;
            height: auto;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .news-card-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0, 210, 255, 0.4);
        }

        /* Mobilos nézet: ha nincs elég hely, a kártya a szöveg alá ugrik */
        @media(max-width: 500px) {
            .news-wrapper { flex-direction: column-reverse; text-align: center; }
            .news-card-thumb { width: 130px; }
        }
    </style>

    <div id="pauper-times" class="news-wrapper">
        <!-- Ide fogja a JavaScript beilleszteni a szöveget és a Scryfall képet -->
    </div>
    <div class="controls-wrapper">
        <input type="text" id="searchInput" class="search-box" placeholder="Játékos keresése...">
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterLocation('all')">Összes helyszín</button>
            <button class="filter-btn" onclick="filterLocation('Remetebarlang')">Remetebarlang</button>
            <button class="filter-btn" onclick="filterLocation('Delta')">Delta</button>
            <button class="filter-btn" onclick="filterLocation('Egyéb')">Egyéb</button>
        </div>
    </div>

    <div id="leaderboard" class="leaderboard-list"></div>
</div>

<script>
const data = {
    "news": {
        "title": "Béla és a Ninják megállíthatatlanok",
        "content": "A legutóbbi Remetebarlangos fordulóban Béla egy olyan 4-0-s kört ment a Ninjas paklijával, hogy a Delta szekció még most is a Spellstutter Sprite-októl visszhangzik.",
        "card_image_name": "Spellstutter Sprite" // Ide jön a kártya pontos angol neve
    },
    "players": [
            {
			"name": "Béla",
            "nickname": "A Béla",
            "tags": ["☀️ Weenie", "💀 Dredge", "💧 Ninjas"],
                "history": [
                    {"date": "2026-05-22", "location": "Remetebarlang", "deck": "Ninjas", "record": "4-0-0", "points": 12},
                    {"date": "2026-05-15", "location": "Delta", "deck": "Dredge", "record": "3-1-0", "points": 9},
                    {"date": "2026-05-08", "location": "Remetebarlang", "deck": "White Weenie", "record": "3-0-1", "points": 10},
                    {"date": "2026-05-01", "location": "Egyéb", "deck": "Ninjas", "record": "4-0-0", "points": 12}
                ]
            },
            {
                "name": "Poholányi Ferenc",
                "nickname": "Lele",
                "tags": ["💧 Faeries"],
                "history": [
                    {"date": "2026-05-22", "location": "Remetebarlang", "deck": "Mono U Faeries", "record": "3-1-0", "points": 9},
                    {"date": "2026-05-15", "location": "Delta", "deck": "Izzet Faeries", "record": "3-1-0", "points": 9},
                    {"date": "2026-05-08", "location": "Remetebarlang", "deck": "Mono U Faeries", "record": "4-0-0", "points": 12},
                    {"date": "2026-05-01", "location": "Egyéb", "deck": "Izzet Faeries", "record": "2-2-0", "points": 6}
                ]
            },
            {
                "name": "Eszti",
                "nickname": "",
                "tags": ["💀 Monoblack", "🦖 Monsters"],
                "history": [
                    {"date": "2026-05-22", "location": "Remetebarlang", "deck": "Monoblack Control", "record": "2-1-1", "points": 7},
                    {"date": "2026-05-15", "location": "Delta", "deck": "RG Monsters", "record": "3-1-0", "points": 9},
                    {"date": "2026-05-08", "location": "Remetebarlang", "deck": "Monoblack Control", "record": "2-2-0", "points": 6},
                    {"date": "2026-05-01", "location": "Egyéb", "deck": "RG Monsters", "record": "3-1-0", "points": 9}
                ]
            },
            {
                "name": "Neuperger Márk",
                "nickname": "",
                "tags": ["🍃 TurboFog", "🛠️ Homebrew"],
                "history": [
                    {"date": "2026-05-22", "location": "Delta", "deck": "TurboFog", "record": "2-2-0", "points": 6},
                    {"date": "2026-05-15", "location": "Delta", "deck": "Sultai Homebrew", "record": "2-2-0", "points": 6},
                    {"date": "2026-05-08", "location": "Remetebarlang", "deck": "TurboFog", "record": "3-1-0", "points": 9},
                    {"date": "2026-04-24", "location": "Remetebarlang", "deck": "TurboFog", "record": "2-1-1", "points": 7}
                ]
            },
            {
                "name": "Bukros Krisztián",
                "nickname": "",
                "tags": ["🛡️ Control", "💧💀 Dimir", "🏰 Gates"],
                "history": [
                    {"date": "2026-05-22", "location": "Remetebarlang", "deck": "Dimir Control", "record": "1-3-0", "points": 3},
                    {"date": "2026-05-15", "location": "Delta", "deck": "Azorius Gates", "record": "2-2-0", "points": 6},
                    {"date": "2026-05-08", "location": "Remetebarlang", "deck": "Dimir Control", "record": "2-2-0", "points": 6},
                    {"date": "2026-05-01", "location": "Egyéb", "deck": "Selesnya Gates", "record": "2-2-0", "points": 6}
                ]
            }
        ]
    };

    let currentLocation = 'all';
    let currentSearch = '';
    const charts = {}; 

    document.getElementById('searchInput').addEventListener('input', (e) => {
        currentSearch = e.target.value;
        renderLeaderboard();
    });

    function filterLocation(location) {
        currentLocation = location;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderLeaderboard();
    }

    function getRecordClass(record) {
        const wins = parseInt(record.split('-')[0]);
        const losses = parseInt(record.split('-')[1]);
        if (wins > losses) return 'text-win';
        if (wins === losses) return 'text-draw';
        return 'text-loss';
    }

    function renderLeaderboard() {
        const container = document.getElementById('leaderboard');
        container.innerHTML = '';

        // Adatok feldolgozása a Helyszín szűrő alapján
        let processed = data.players.map(player => {
            const filteredHistory = player.history.filter(h => {
                if (currentLocation === 'all') return true;
                return h.location.toLowerCase() === currentLocation.toLowerCase();
            });

            const totalPoints = filteredHistory.reduce((sum, item) => sum + item.points, 0);
            
            // Form guide trend (utolsó 5 meccs helyszíntől függetlenül)
            const formGuide = player.history.slice(0, 5).map(h => {
                const wins = parseInt(h.record.split('-')[0]);
                const losses = parseInt(h.record.split('-')[1]);
                return wins > losses ? 'win' : (wins === losses ? 'draw' : 'loss');
            });

            return {
                name: player.name,
                nickname: player.nickname,
                tags: player.tags,
                total_points: totalPoints,
                history: filteredHistory,
                form: formGuide
            };
        });

        // Név/Becenév alapú keresés
        if (currentSearch.trim() !== '') {
            processed = processed.filter(p => 
                p.name.toLowerCase().includes(currentSearch.toLowerCase()) || 
                p.nickname.toLowerCase().includes(currentSearch.toLowerCase())
            );
        }

        // Sorbarendezés pontok alapján
        processed.sort((a, b) => b.total_points - a.total_points);

        if (processed.length === 0) {
            container.innerHTML = `<div class="no-results">Nincs találat a megadott feltételekkel...</div>`;
            return;
        }

        processed.forEach((player, index) => {
            const rank = index + 1;
            const card = document.createElement('div');
            card.className = `player-card rank-${rank}`;
            card.id = `player-${index}`;

            // Becenév kezelése zárójelben
            const nameHtml = player.nickname 
                ? `<span class="player-name">${player.name} <span class="player-nickname">(${player.nickname})</span></span>`
                : `<span class="player-name">${player.name}</span>`;

            // Rugalmas tag listák (plecsnik) generálása
            const tagsHtml = player.tags.map(t => `<span class="badge">${t}</span>`).join('');
            const formHtml = player.form.map(f => `<span class="form-dot form-${f}"></span>`).join('');

            // Táblázat sorok
            let tableRows = player.history.map(h => `
                <tr>
                    <td>${h.date}</td>
                    <td><b>${h.location}</b><br><small style="color:var(--text-muted)">${h.deck}</small></td>
                    <td class="${getRecordClass(h.record)}">${h.record}</td>
                    <td style="text-align:right; font-weight:bold; color:var(--accent-blue)">+${h.points} pont</td>
                </tr>
            `).join('');

            if (tableRows === '') {
                tableRows = `<tr><td colspan="4" style="text-align:center; color:var(--text-muted)">Ezen a helyszínen még nincs rögzített meccs.</td></tr>`;
            }

            card.innerHTML = `
                <div class="player-header" onclick="toggleCard(${index})">
                    <div class="player-info-left">
                        <span class="rank-number">#${rank}</span>
                        <div class="player-name-wrapper">
                            ${nameHtml}
                            <div class="badges" style="margin-top: 6px;">${tagsHtml}</div>
                        </div>
                    </div>
                    <div class="player-info-right">
                        <div class="form-guide" title="Utolsó 5 verseny alakulása">${formHtml}</div>
                        <span class="player-score">${player.total_points} pont</span>
                    </div>
                </div>
                <div class="player-details">
                    <div class="details-content">
                        <div class="chart-container">
                            <canvas id="chart-${index}"></canvas>
                        </div>
                        <div class="history-table-wrapper">
                            <table class="history-table">
                               <thead>
                                   <tr>
                                       <th>Dátum</th>
                                       <th>Helyszín / Deck</th>
                                       <th>Eredmény</th>
                                       <th style="text-align:right">Pont</th>
                                   </tr>
                               </thead>
                               <tbody>${tableRows}</tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;

            container.appendChild(card);

            const chronHistory = [...player.history].reverse();
            let runningTotal = 0;
            const chartData = chronHistory.map(h => {
                runningTotal += h.points;
                return { date: h.date, total: runningTotal };
            });

            if (chartData.length > 0) {
                setTimeout(() => initChart(index, chartData), 50);
            }
        });
    }

    function toggleCard(index) {
        const card = document.getElementById(`player-${index}`);
        const isActive = card.classList.contains('active');
        document.querySelectorAll('.player-card').forEach(c => c.classList.remove('active'));
        if (!isActive) card.classList.add('active');
    }

    function initChart(index, chartData) {
        const canvas = document.getElementById(`chart-${index}`);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        if (charts[index]) charts[index].destroy();

        charts[index] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartData.map(d => d.date),
                datasets: [{
                    data: chartData.map(d => d.total),
                    borderColor: '#00d2ff',
                    backgroundColor: 'rgba(0, 210, 255, 0.05)',
                    borderWidth: 2,
                    tension: 0.2,
                    fill: true,
                    pointBackgroundColor: '#d4af37',
                    pointRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { color: '#2a2a35' }, ticks: { color: '#9898a6', font: { size: 9 } } },
                    y: { grid: { color: '#2a2a35' }, ticks: { color: '#9898a6', font: { size: 10 } } }
                }
            }
        });
    }

    renderLeaderboard();
	// 3. LÉPÉS: Scryfall API integráció és a Hírek rovat legenerálása
    function renderNews() {
        const newsContainer = document.getElementById('pauper-times');
        if (!data.news || !newsContainer) return;

        // Első körben összerakjuk a szöveges részt a dobozban
        newsContainer.innerHTML = `
            <div class="news-text">
                <h3>📰 Pauper Times — Aktuális Meta</h3>
                <h4 style="color: #fff; margin-bottom: 5px;">${data.news.title}</h4>
                <p>${data.news.content}</p>
            </div>
            <div id="news-card-placeholder"></div>
        `;

        // Ha van megadva kártyanév, lekérjük a Scryfall API-tól
        if (data.news.card_image_name) {
            const cardNameEncoded = encodeURIComponent(data.news.card_image_name);
            
            // Meghívjuk a Scryfall ingyenes, név alapú keresőjét
            fetch(`https://api.scryfall.com/cards/named?exact=${cardNameEncoded}`)
                .then(response => response.json())
                .then(cardData => {
                    // Megkeressük a normál méretű kép URL-jét a válaszban
                    if (cardData && cardData.image_uris && cardData.image_uris.normal) {
                        const imgUrl = cardData.image_uris.normal;
                        const placeholder = document.getElementById('news-card-placeholder');
                        if (placeholder) {
                            placeholder.innerHTML = `<img src="${imgUrl}" alt="${data.news.card_image_name}" class="news-card-thumb">`;
                        }
                    }
                })
                .catch(error => console.error("Hiba a Scryfall kép betöltésekor:", error));
        }
    }

    // Futtatjuk a hírek renderelését is az oldal betöltésekor
    renderNews();
</script>
</body>
</html>
